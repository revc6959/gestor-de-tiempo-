<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Mi Gestor de Tiempo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Georgia',serif;background:#F5F0EB;color:#1A1015;min-height:100vh;}
input,select,button,textarea{font-family:inherit;}
.hdr{background:linear-gradient(160deg,#1A1015 0%,#3D1A2E 60%,#5C1F45 100%);padding:18px 16px 12px;color:white;}
.hdr-sub{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:#F9A8D4;margin-bottom:3px;}
.hdr h1{font-size:19px;font-weight:900;font-style:italic;color:#FDF4FF;margin-bottom:2px;}
.hdr-fecha{font-size:10px;color:rgba(255,255,255,0.4);margin-top:2px;}
.nav{display:flex;background:#1A1015;overflow-x:auto;position:sticky;top:0;z-index:50;border-bottom:1px solid #3D1A2E;}
.nav::-webkit-scrollbar{display:none;}
.nb{flex:0 0 auto;padding:9px 10px;border:none;background:transparent;color:rgba(255,255,255,0.35);font-family:inherit;font-size:9px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;letter-spacing:0.8px;text-transform:uppercase;white-space:nowrap;transition:all 0.2s;}
.nb.on{color:#F9A8D4;font-weight:800;border-bottom-color:#F9A8D4;}
.body{padding:12px;max-width:520px;margin:0 auto;padding-bottom:30px;}
.card{background:white;border-radius:13px;padding:14px;margin-bottom:10px;box-shadow:0 1px 6px rgba(26,16,21,0.07);}
.sec{font-size:9px;font-weight:800;color:#9B4468;letter-spacing:2.5px;text-transform:uppercase;margin-bottom:11px;}
.inp{width:100%;padding:9px 11px;border-radius:8px;border:1.5px solid #E8D5DF;background:#FDFBFC;font-size:13px;margin-bottom:8px;outline:none;font-family:inherit;}
.inp:focus{border-color:#9B4468;}
.sel{width:100%;padding:9px 11px;border-radius:8px;border:1.5px solid #E8D5DF;background:#FDFBFC;font-size:13px;margin-bottom:8px;font-family:inherit;}
.btn{width:100%;padding:11px;background:linear-gradient(135deg,#9B4468,#C2185B);color:white;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;margin-top:4px;font-family:inherit;}
.btns{width:100%;padding:10px;background:transparent;color:#9B4468;border:1.5px solid #9B4468;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;margin-top:4px;font-family:inherit;}
.btnx{background:none;border:none;color:#CCC;cursor:pointer;font-size:16px;padding:2px 5px;line-height:1;font-family:inherit;}
.fc{background:#FDF2F8;border-radius:12px;padding:13px;margin-bottom:10px;border:1.5px dashed #D4869E;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}
.vst{display:none;}
.vst.on{display:block;}
.act{border-radius:10px;padding:10px 11px;margin-bottom:6px;border-left:3px solid #DDD;background:#FAFAFA;}
.ck{width:20px;height:20px;border-radius:6px;border:2px solid #DDD;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:white;transition:all 0.15s;}
.lbl{font-size:10px;color:#888;margin-bottom:3px;}
.hint{font-size:12px;color:#888;line-height:1.6;margin-bottom:12px;}
.empty{text-align:center;color:#CCC;padding:16px 0;font-size:12px;}
.alrt{border-radius:10px;padding:10px 12px;margin-bottom:8px;}
.tb{border-radius:11px;padding:12px;margin-bottom:10px;border-left:4px solid;}
.pb{height:5px;border-radius:3px;margin:5px 0 2px;background:#EEE;}
.pb-fill{height:100%;border-radius:3px;transition:width 0.3s;}
.bdg{display:inline-block;font-size:9px;padding:2px 6px;border-radius:6px;font-weight:700;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-top:6px;}
.cal-day{text-align:center;padding:6px 2px;border-radius:6px;cursor:pointer;font-size:11px;border:1.5px solid transparent;}
.cal-day:hover{background:#FDF2F8;}
.cal-day.hoy{border-color:#9B4468;color:#9B4468;font-weight:800;}
.cal-day.sel{background:#9B4468;color:white;font-weight:800;}
.dia-btn{padding:5px 9px;border-radius:7px;border:1.5px solid #E8D5DF;background:white;color:#666;font-size:11px;font-weight:700;cursor:pointer;transition:all 0.15s;}
.dia-btn.on{background:#9B4468;color:white;border-color:#9B4468;}
/* Valeria */
.cw{display:flex;flex-direction:column;background:#FAF7F8;border-radius:12px;padding:12px;margin-bottom:8px;overflow-y:auto;max-height:380px;min-height:200px;}
.bb{max-width:86%;padding:10px 12px;border-radius:13px;font-size:12px;line-height:1.6;margin-bottom:8px;}
.bai{border-radius:13px 13px 13px 3px;background:white;border:1px solid #F0E4EA;}
.bus{border-radius:13px 13px 3px 13px;background:linear-gradient(135deg,#9B4468,#C2185B);color:white;align-self:flex-end;}
/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:200;display:flex;align-items:flex-end;justify-content:center;}
.modal-box{background:white;border-radius:18px 18px 0 0;padding:20px;width:100%;max-width:520px;max-height:88vh;overflow-y:auto;}
input[type=range]{width:100%;accent-color:#9B4468;}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-sub">Sistema de Cubos v3 &middot; Mama &middot; Estudiante &middot; Emprendedora</div>
  <h1>Mi Gestor de Tiempo</h1>
  <div class="hdr-fecha" id="fhoy"></div>
  <div id="sbdg" style="margin-top:5px"></div>
</div>
<div class="nav" id="nav"></div>
<div class="body">
  <div class="vst on" id="v-dia"></div>
  <div class="vst" id="v-semana"></div>
  <div class="vst" id="v-pendientes"></div>
  <div class="vst" id="v-auditoria"></div>
  <div class="vst" id="v-metas"></div>
  <div class="vst" id="v-inventario"></div>
  <div class="vst" id="v-valeria"></div>
  <div class="vst" id="v-historial"></div>
  <div class="vst" id="v-nota"></div>
</div>
<div id="modalCal" style="display:none" class="modal-bg"></div>
<div id="modalRen" style="display:none" class="modal-bg"></div>
<div id="modalAct" style="display:none" class="modal-bg"></div>
<script>
// ============================================================
// CONSTANTES
// ============================================================
var CUBOS=[
  {id:'bebe',l:'Bebe',c:'#F472B6',bg:'#FDF2F8',dk:'#BE185D'},
  {id:'personal',l:'Personal',c:'#FB923C',bg:'#FFF7ED',dk:'#C2410C'},
  {id:'academico',l:'Academico',c:'#60A5FA',bg:'#EFF6FF',dk:'#1D4ED8'},
  {id:'emprendimiento',l:'Negocio',c:'#A78BFA',bg:'#F5F3FF',dk:'#6D28D9'},
  {id:'hogar',l:'Hogar',c:'#34D399',bg:'#ECFDF5',dk:'#065F46'},
  {id:'recuperacion',l:'Descanso',c:'#FBBF24',bg:'#FFFBEB',dk:'#92400E'}
];
var DIAS_L=['Lunes','Martes','Miercoles','Jueves','Viernes'];
var DIAS_K=['lunes','martes','miercoles','jueves','viernes'];
var DIAS_DOW=[1,2,3,4,5];
function getWeekDates(offset){
  offset=offset||0;
  var today=new Date();
  var dow=today.getDay();
  var monday=new Date(today.getFullYear(),today.getMonth(),today.getDate()-(dow===0?6:dow-1)+offset*7,12,0,0);
  var map={};
  DIAS_K.forEach(function(dk,i){
    var d=new Date(monday.getFullYear(),monday.getMonth(),monday.getDate()+i,12,0,0);
    var yr=d.getFullYear(),mo=d.getMonth()+1,dy=d.getDate();
    map[dk]=yr+'-'+(mo<10?'0':'')+mo+'-'+(dy<10?'0':'')+dy;
  });
  var myr=monday.getFullYear(),mmo=monday.getMonth()+1,mdy=monday.getDate();
  map._monday=myr+'-'+(mmo<10?'0':'')+mmo+'-'+(mdy<10?'0':'')+mdy;
  return map;
}
function fmtSemana(offset){
  var wd=getWeekDates(offset);
  var ini=fds(wd['lunes']),fin=fds(wd['viernes']);
  return ini+' — '+fin;
}
var SUBCATS={
  bebe:['Cuidado Directo','Alimentacion','Educ. Extracurricular','Salud','Logistica','Estimulacion y Desarrollo'],
  personal:['Ejercicio Fisico','Arreglo Personal','Salud','Meditacion','Autoconocimiento','Recreacion / Ocio','Planificacion Personal'],
  academico:['Formacion Profesional','Metafisica China','Desarrollo Personal','Formacion Parental'],
  emprendimiento:['Conformacion y Gestion','Postulacion a Contratos','Ejecucion de Contratos','Produccion de Contenidos'],
  hogar:['Alimentacion','Organizacion y Limpieza','Proyecto Renovacion','Compras'],
  recuperacion:['Sueno','Descanso Activo']
};
var SUBSUBCATS={
  'Formacion Profesional':['Clases / Sesiones Sincronas','Estudio e Investigacion','Trabajos y Entregas','Admin Universitaria'],
  'Metafisica China':['Clases / Sesiones Sincronas','Estudio e Investigacion','Aplicacion y Practica','Entregas'],
  'Desarrollo Personal':['Clases / Sesiones Sincronas','Estudio e Investigacion','Practica Activa','Entregas'],
  'Formacion Parental':['Talleres','Lectura e Investigacion']
};
function subsubcatOpts(subcatVal,sel){
  var subs=SUBSUBCATS[subcatVal]||[];
  if(!subs.length)return'';
  var o='<option value="">-- Tipo de actividad --</option>';
  subs.forEach(function(s){o+='<option value="'+s+'"'+(s===sel?' selected':'')+'>'+s+'</option>';});
  return o;
}
function updSubsubcat(subcatSelId,subsubcatContId){
  var subEl=document.getElementById(subcatSelId);
  var cont=document.getElementById(subsubcatContId);
  if(!subEl||!cont)return;
  var opts=subsubcatOpts(subEl.value,'');
  if(opts){cont.innerHTML='<select class="sel" id="'+subsubcatContId+'_sel">'+opts+'</select>';cont.style.display='block';}
  else{cont.innerHTML='';cont.style.display='none';}
}
function dowToDk(dow){
  // dow: 1=lunes,2=martes,3=mie,4=jue,5=vie. Returns DIAS_K string.
  if(dow>=1&&dow<=5)return DIAS_K[dow-1];
  return '';
}
function subcatOpts(cuboId,sel){
  var subs=SUBCATS[cuboId]||[];
  var o='<option value="">-- Subcategoria (opcional) --</option>';
  subs.forEach(function(s){o+='<option value="'+s+'"'+(s===sel?' selected':'')+'>'+s+'</option>';});
  return o;
}
function updSubcat(cuboSelId,subcatSelId){
  var cubo=document.getElementById(cuboSelId);
  var subcat=document.getElementById(subcatSelId);
  if(!cubo||!subcat)return;
  subcat.innerHTML=subcatOpts(cubo.value,'');
}
var HCOG={lunes:1.5,martes:3.25,miercoles:1.5,jueves:3.25,viernes:1.5};
var SLEEP=[
  {max:5,niv:'CRITICO',c:'#EF4444',msg:'Solo tareas automaticas. Walker: privacion severa.'},
  {max:6,niv:'DEFICITARIO',c:'#F97316',msg:'Memoria reducida ~40%. Solo rutinas.'},
  {max:7,niv:'FUNCIONAL',c:'#EAB308',msg:'Puedes trabajar con limitaciones.'},
  {max:8,niv:'OPTIMO',c:'#22C55E',msg:'Corteza prefrontal funcionando bien.'},
  {max:25,niv:'EXCELENTE',c:'#10B981',msg:'Dia de alta productividad.'}
];
var TIPS=[
  {c:'#EF4444',bg:'#FEF2F2',t:'Sueno critico',m:'Despues de 17-19h sin dormir tu rendimiento equivale a 0.05% alcohol. Prioridad 1: recuperar sueno.',s:'Walker, Why We Sleep (2017)'},
  {c:'#F97316',bg:'#FFF7ED',t:'Deficit de sueno',m:'Sueno fragmentado no equivale al continuo. La deuda de sueno afecta memoria y decision.',s:'Walker (2017)'},
  {c:'#EF4444',bg:'#FEF2F2',t:'Tareas vencidas',m:'Decide hoy: ejecutar o eliminar. Sin termino medio.',s:'Eisenhower / Covey (1989)'},
  {c:'#A78BFA',bg:'#F5F3FF',t:'Tareas sin accion',m:'Sin proxima accion fisica ninguna tarea avanza. Efecto Zeigarnik.',s:'Allen, GTD (2001)'},
  {c:'#EF4444',bg:'#FEF2F2',t:'Sobrecarga',m:'La esencia de la estrategia es elegir que NO hacer. Regla 5/25.',s:'Porter / Buffett'},
  {c:'#60A5FA',bg:'#EFF6FF',t:'Ventana cognitiva',m:'El pico cognitivo ocurre en la manana. Protege ese bloque.',s:'Pink, When (2018)'},
  {c:'#22C55E',bg:'#F0FDF4',t:'Sistema equilibrado',m:'Las madres profesionales modernas pasan mas tiempo con sus hijos porque priorizan intencionalmente.',s:'Vanderkam, 168 Hours (2010)'}
];

// ============================================================
// ESTADO
// ============================================================
function defState(){
  return {
    actividades:[],
    pendientes:[],
    metas:[],
    inventario:[],
    checkin:{hecho:false,sueno:7,int:1,animo:3},
    cumplimiento:{},
    mensajes:[{rol:'asistente',texto:'Hola, soy Valeria — tu COO de productividad. Walker, Newport, Vanderkam, Allen, Pink, Buffett. Sin rodeos. Que necesitas?'}]
  };
}
function loadS(){
  try{
    var raw=localStorage.getItem('cubos_v7');
    if(raw){
      var d=JSON.parse(raw);
      var def=defState();
      // Merge preserving all fields
      return {
        actividades:d.actividades||[],
        pendientes:d.pendientes||[],
        metas:d.metas||[],
        inventario:d.inventario||[],
        checkin:Object.assign(def.checkin,d.checkin||{}),
        cumplimiento:d.cumplimiento||{},
        mensajes:d.mensajes||def.mensajes
      };
    }
  }catch(e){}
  return defState();
}
function save(){try{localStorage.setItem('cubos_v7',JSON.stringify(S));}catch(e){}}
var S=loadS();
var vista='dia',calTgt=null,calCb=null,calY=new Date().getFullYear(),calM=new Date().getMonth(),semOffset=0;

// ============================================================
// HELPERS
// ============================================================
function gc(id){return CUBOS.find(function(c){return c.id===id;})||CUBOS[0];}
function toS(){var d=new Date();var yr=d.getFullYear(),mo=d.getMonth()+1,dy=d.getDate();return yr+'-'+(mo<10?'0':'')+mo+'-'+(dy<10?'0':'')+dy;}
function dkHoy(){var d=new Date().getDay();return['','lunes','martes','miercoles','jueves','viernes','',''][d]||null;}
function gsl(h,i){var e=Math.max(0,h-i*0.3);return SLEEP.find(function(l){return e<l.max;})||SLEEP[SLEEP.length-1];}
function tM(t){if(!t)return 9999;var p=t.split(':');return parseInt(p[0])*60+parseInt(p[1]);}
function fds(dt){if(!dt)return'';try{var d=new Date(dt+'T12:00:00');return d.toLocaleDateString('es-ES',{day:'numeric',month:'short'});}catch(e){return dt;}}
function hOpts(sel){
  var o='<option value="">--</option>';
  for(var h=0;h<24;h++)for(var m=0;m<60;m+=15){
    var v=(h<10?'0':'')+h+':'+(m<10?'0':'')+m;
    o+='<option value="'+v+'"'+(v===sel?' selected':'')+'>'+v+'</option>';
  }
  return o;
}
function cuboOpts(sel){
  return CUBOS.map(function(c){return'<option value="'+c.id+'"'+(c.id===sel?' selected':'')+'>'+c.l+'</option>';}).join('');
}
function bdg(bg,c,t){return'<span class="bdg" style="background:'+bg+';color:'+c+'">'+t+'</span>';}
function hpSem(){return S.actividades.filter(function(a){return !a.hecha;}).reduce(function(s,a){return s+Math.max(0,tM(a.hf)-tM(a.hi))/60;},0);}
function tC(){var t=S.actividades.length;return t?Math.round(S.actividades.filter(function(a){return a.hecha;}).length/t*100):0;}
function mPct(m){if(!m.pasos||!m.pasos.length)return 0;return Math.round(m.pasos.filter(function(p){return p.ok;}).length/m.pasos.length*100);}
function getTip(){
  var ci=S.checkin,ef=Math.max(0,ci.sueno-ci.int*0.3);
  var venc=S.actividades.filter(function(a){return !a.hecha&&a.fecha&&a.fecha<toS();}).length;
  var sinAcc=S.actividades.filter(function(a){return !a.hecha&&!a.proximaAccion;}).length;
  if(ef<5)return TIPS[0];
  if(ef<6)return TIPS[1];
  if(venc>0)return TIPS[2];
  if(sinAcc>2)return TIPS[3];
  if(hpSem()>11)return TIPS[4];
  if(ef>=7)return TIPS[5];
  return TIPS[6];
}

// ============================================================
// CALENDARIO MODAL
// ============================================================
function showCal(tgt,cb){
  calTgt=tgt;calCb=cb;
  calY=new Date().getFullYear();calM=new Date().getMonth();
  renderCal();
}
function renderCal(){
  var modal=document.getElementById('modalCal');modal.style.zIndex='500';
  var meses=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  var fd=new Date(calY,calM,1).getDay();
  var dim=new Date(calY,calM+1,0).getDate();
  var hoy=toS();
  var sv=calTgt?document.getElementById(calTgt).value:'';
  var cells='';
  ['D','L','M','M','J','V','S'].forEach(function(d){cells+='<div style="text-align:center;font-size:9px;font-weight:700;color:#999;padding:3px 0">'+d+'</div>';});
  for(var e=0;e<fd;e++)cells+='<div></div>';
  for(var day=1;day<=dim;day++){
    var mn=calM+1;
    var dv=calY+'-'+(mn<10?'0':'')+mn+'-'+(day<10?'0':'')+day;
    var cls='cal-day'+(dv===hoy?' hoy':'')+(dv===sv?' sel':'');
    cells+='<div class="'+cls+'" onclick="pickDay(\''+dv+'\')">'+day+'</div>';
  }
  modal.style.display='flex';
  modal.innerHTML='<div class="modal-box"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><button onclick="calNav(-1)" style="background:none;border:none;font-size:22px;cursor:pointer;color:#9B4468">&lsaquo;</button><strong style="font-size:13px">'+meses[calM]+' '+calY+'</strong><button onclick="calNav(1)" style="background:none;border:none;font-size:22px;cursor:pointer;color:#9B4468">&rsaquo;</button></div><div class="cal-grid">'+cells+'</div><button onclick="closeCal()" style="width:100%;margin-top:12px;padding:10px;background:#F5EEF1;border:none;border-radius:9px;font-size:12px;color:#888;cursor:pointer">Cancelar</button></div>';
}
function calNav(d){calM+=d;if(calM>11){calM=0;calY++;}if(calM<0){calM=11;calY--;}renderCal();}
function pickDay(v){
  if(calTgt){var el=document.getElementById(calTgt);if(el)el.value=v;}
  if(calCb)calCb(v);
  closeCal();
}
function closeCal(){document.getElementById('modalCal').style.display='none';}

// ============================================================
// MODAL NUEVA ACTIVIDAD
// ============================================================
function showModalAct(origen){
  var modal=document.getElementById('modalAct');
  var h='<div class="modal-box">';
  h+='<div class="sec" style="margin-bottom:11px">Nueva actividad</div>';
  h+='<input class="inp" id="maTit" placeholder="Que hay que hacer?"/>';
  h+='<select class="sel" id="maCubo" onchange="updSubcat(\'maCubo\',\'maSubcat\');document.getElementById(\'maSubsubcatCont\').innerHTML=\'\';document.getElementById(\'maSubsubcatCont\').style.display=\'none\'" >'+cuboOpts('academico')+'</select>';
  h+='<select class="sel" id="maSubcat" onchange="updSubsubcat(\'maSubcat\',\'maSubsubcatCont\')">'+subcatOpts('academico','')+'</select>';
  h+='<div id="maSubsubcatCont" style="display:none"></div>';
  h+='<select class="sel" id="maPrio"><option value="alta">Alta prioridad</option><option value="media" selected>Media prioridad</option><option value="baja">Baja prioridad</option></select>';
  // Tipo programacion
  h+='<div class="lbl" style="margin-bottom:6px">Programacion:</div>';
  h+='<div style="display:flex;gap:6px;margin-bottom:10px">';
  h+='<button id="tipU" onclick="setTipo(\'unica\')" style="flex:1;padding:7px;background:#9B4468;color:white;border:none;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer">Fecha unica</button>';
  h+='<button id="tipR" onclick="setTipo(\'rango\')" style="flex:1;padding:7px;background:#EEE;color:#666;border:none;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer">Rango</button>';
  h+='<button id="tipRec" onclick="setTipo(\'recurrente\')" style="flex:1;padding:7px;background:#EEE;color:#666;border:none;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer">Recurrente</button>';
  h+='</div>';
  // Fecha unica
  h+='<div id="secUnica" style="display:block">';
  h+='<div class="lbl">Fecha:</div><div style="display:flex;gap:6px;margin-bottom:8px"><input id="maF" class="inp" style="margin-bottom:0;flex:1;font-size:12px" placeholder="Selecciona fecha" readonly/><button onclick="showCal(\'maF\',null)" style="padding:8px 11px;background:#FDF2F8;border:1.5px solid #D4869E;border-radius:8px;font-size:12px;cursor:pointer">Cal</button></div>';
  h+='<div class="g2" style="margin-bottom:8px"><div><div class="lbl">Hora inicio</div><select id="maHi" style="width:100%;padding:7px;border-radius:8px;border:1.5px solid #E8D5DF;font-size:12px">'+hOpts('')+'</select></div><div><div class="lbl">Hora fin</div><select id="maHf" style="width:100%;padding:7px;border-radius:8px;border:1.5px solid #E8D5DF;font-size:12px">'+hOpts('')+'</select></div></div>';
  h+='</div>';
  // Rango
  h+='<div id="secRango" style="display:none">';

function guardarAct(origen){
  var tit=document.getElementById('maTit').value.trim();
  if(!tit){alert('Escribe el nombre de la actividad');return;}
  var cubo=document.getElementById('maCubo').value;
  var prio=document.getElementById('maPrio').value;
  var subcat=document.getElementById('maSubcat')?document.getElementById('maSubcat').value:'';
  var subsubcatEl=document.getElementById('maSubsubcatCont_sel');
  var subsubcat=subsubcatEl?subsubcatEl.value:'';
  var tipU=document.getElementById('secUnica').style.display!=='none';
  var tipR=document.getElementById('secRango').style.display!=='none';
  var tipRec=document.getElementById('secRec').style.display!=='none';
  var count=0;
  if(tipU){
    var fecha=document.getElementById('maF').value;
    var hi=document.getElementById('maHi').value;
    var hf=document.getElementById('maHf').value;
    var dn=fecha?new Date(fecha+'T12:00:00').getDay():new Date().getDay();
    var dk2=dowToDk(dn);
    S.actividades.push({id:Date.now(),titulo:tit,cubo:cubo,subcat:subcat,subsubcat:subsubcat,prioridad:prio,hi:hi,hf:hf,fecha:fecha,dia:dk2,hecha:false,recurrente:false});
    count=1;
  } else if(tipR){
    var fi=document.getElementById('maFI').value,ff=document.getElementById('maFF').value;
    if(!fi||!ff){alert('Selecciona fechas de inicio y fin');return;}
    var sched={};
    document.querySelectorAll('#rg1Dias .on').forEach(function(b){sched[Number(b.getAttribute('data-dow'))]={hi:document.getElementById('rg1Hi').value,hf:document.getElementById('rg1Hf').value};});
    document.querySelectorAll('#rg2Dias .on').forEach(function(b){if(!sched[Number(b.getAttribute('data-dow'))])sched[Number(b.getAttribute('data-dow'))]={hi:document.getElementById('rg2Hi').value,hf:document.getElementById('rg2Hf').value};});
    if(!Object.keys(sched).length){alert('Selecciona al menos un dia');return;}
    // Parse dates as local noon to avoid timezone shifts
    var fiParts=fi.split('-'),ffParts=ff.split('-');
    var cur=new Date(Number(fiParts[0]),Number(fiParts[1])-1,Number(fiParts[2]),12,0,0);
    var end=new Date(Number(ffParts[0]),Number(ffParts[1])-1,Number(ffParts[2]),12,0,0);
    while(cur<=end){
      var dow=cur.getDay();
      if(sched[dow]){
        var dk3=dowToDk(dow);
        var yr=cur.getFullYear(),mo=cur.getMonth()+1,dy=cur.getDate();
        var f=yr+'-'+(mo<10?'0':'')+mo+'-'+(dy<10?'0':'')+dy;
        S.actividades.push({id:Date.now()+count,titulo:tit,cubo:cubo,subcat:subcat,subsubcat:subsubcat,prioridad:prio,hi:sched[dow].hi,hf:sched[dow].hf,fecha:f,dia:dk3,hecha:false,recurrente:false});
        count++;
      }
      cur.setDate(cur.getDate()+1);
    }
    if(!count){alert('No hay dias en ese rango');return;}
  } else if(tipRec){
    var dias=[];
    document.querySelectorAll('#recDias .on').forEach(function(b){dias.push(Number(b.getAttribute('data-dow')));});
    if(!dias.length){alert('Selecciona al menos un dia');return;}
    var hi2=document.getElementById('recHi').value,hf2=document.getElementById('recHf').value;
    // Create for next 4 weeks
    var today=new Date();
    for(var w=0;w<4;w++){
      dias.forEach(function(dow){
        var d2=new Date(today);
        var diff=(dow-today.getDay()+7)%7+w*7;
        d2.setDate(today.getDate()+diff);
        var fRec=d2.toISOString().split('T')[0];
        var dk4=dowToDk(dow);
        S.actividades.push({id:Date.now()+count,titulo:tit,cubo:cubo,subcat:subcat,subsubcat:subsubcat,prioridad:prio,hi:hi2,hf:hf2,fecha:fRec,dia:dk4,hecha:false,recurrente:true});
        count++;
      });
    }
  }
  save();closeModalAct();rDia();rSem();
}

function rSem(){
  var hoy=toS(),d=dkHoy();
  var esHoy=semOffset===0;
  var h='<div style="display:flex;align-items:center;justify-content:space-between;background:white;border-radius:12px;padding:10px 14px;margin-bottom:10px;box-shadow:0 1px 6px rgba(26,16,21,0.07)">';
  h+='<button onclick="semOffset--;rSem()" style="background:#FDF2F8;border:1.5px solid #D4869E;border-radius:8px;font-size:18px;cursor:pointer;color:#9B4468;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-family:inherit">&lsaquo;</button>';
  h+='<div style="text-align:center"><div style="font-size:10px;font-weight:800;color:#9B4468;letter-spacing:1px">'+(esHoy?'SEMANA ACTUAL':semOffset>0?'+'+semOffset+' SEMANA':''+semOffset+' SEMANA')+'</div><div style="font-size:11px;color:#888">'+fmtSemana(semOffset)+'</div></div>';
  h+='<button onclick="semOffset++;rSem()" style="background:#FDF2F8;border:1.5px solid #D4869E;border-radius:8px;font-size:18px;cursor:pointer;color:#9B4468;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-family:inherit">&rsaquo;</button>';
  h+='</div>';
  if(!esHoy)h+='<button onclick="semOffset=0;rSem()" style="width:100%;padding:7px;background:#FDF2F8;border:1.5px solid #D4869E;border-radius:9px;font-size:11px;color:#9B4468;font-weight:700;cursor:pointer;margin-bottom:8px;font-family:inherit">Volver a semana actual</button>';
  h+='<button class="btn" onclick="showModalAct(\'semana\')" style="margin-bottom:10px">+ Agregar actividad</button>';
  DIAS_K.forEach(function(dk2,di){
    var disp=HCOG[dk2]||0;
    var weekDates=getWeekDates(semOffset);
    var dk2Date=weekDates[dk2]||'';
    var actsD=S.actividades.filter(function(a){
      if(a.hecha)return false;
      if(a.fecha&&a.fecha===dk2Date)return true;
      if(!a.fecha&&semOffset===0&&a.dia===dk2)return true;
      if(a.recurrente&&a.dia===dk2)return true;
      return false;
    });
    var actsDone=S.actividades.filter(function(a){
      if(!a.hecha)return false;
      if(a.fecha&&a.fecha===dk2Date)return true;
      if(!a.fecha&&semOffset===0&&a.dia===dk2)return true;
      return false;
    });
    var hUsadas=actsD.reduce(function(s,a){return s+Math.max(0,tM(a.hf)-tM(a.hi))/60;},0);
    var libre=Math.max(0,disp-hUsadas);
    var sobre=hUsadas>disp;
    var isHoy=(dk2===d);
    // Metas que vencen este dia
    var metasDia=S.metas.filter(function(m){return m.vencimiento&&new Date(m.vencimiento+'T12:00:00').getDay()===DIAS_DOW[di];});
    h+='<div style="background:white;border-radius:13px;margin-bottom:10px;overflow:hidden;box-shadow:0 1px 6px rgba(26,16,21,0.07)">';
    h+='<div style="padding:11px 13px;background:'+(isHoy?'linear-gradient(135deg,#3D1A2E,#5C1F45)':'#FAF7F8')+';display:flex;justify-content:space-between;align-items:center">';
    h+='<div><div style="font-size:13px;font-weight:800;color:'+(isHoy?'white':'#1A1015')+'">'+DIAS_L[di]+(isHoy?' (HOY)':'')+'</div>';
    h+='<div style="font-size:10px;color:'+(isHoy?'rgba(255,255,255,0.5)':'#999')+'">'+disp+'h cog &middot; '+libre.toFixed(1)+'h libre</div></div>';
    h+='<span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:7px;background:'+(sobre?'#FEE2E2':'#DCFCE7')+';color:'+(sobre?'#EF4444':'#166534')+'">'+(sobre?'Cargado':'OK')+'</span></div>';
    h+='<div style="padding:8px 13px 11px">';
    // Metas que vencen
    metasDia.forEach(function(m){
      h+='<div style="background:#FEF2F2;border-radius:7px;padding:5px 9px;margin-bottom:5px;font-size:11px;color:#EF4444;font-weight:700">⚑ Meta: '+m.titulo+' vence '+fds(m.vencimiento)+'</div>';
    });
    if(actsD.length){
      actsD.sort(function(a,b){return tM(a.hi)-tM(b.hi);});
      actsD.forEach(function(a){h+=renderActItem(a,false);});
    }
    if(actsDone.length){

function setPendTipo(pid,tipo){
  var u=document.getElementById('ppU_'+pid);
  var r=document.getElementById('ppR_'+pid);
  var tu=document.getElementById('ppTU_'+pid);
  var tr=document.getElementById('ppTR_'+pid);
  if(!u||!r)return;
  u.style.display=tipo==='unica'?'block':'none';
  r.style.display=tipo==='rango'?'block':'none';
  if(tu){tu.style.background=tipo==='unica'?'#9B4468':'#EEE';tu.style.color=tipo==='unica'?'white':'#666';}
  if(tr){tr.style.background=tipo==='rango'?'#9B4468':'#EEE';tr.style.color=tipo==='rango'?'white':'#666';}
}
function confPendRango(id){
  var p=S.pendientes.find(function(x){return x.id===id;});if(!p)return;
  var fi=document.getElementById('ppFI_'+id).value,ff=document.getElementById('ppFF_'+id).value;
  if(!fi||!ff){alert('Selecciona fechas inicio y fin');return;}
  var dias=[];
  document.querySelectorAll('#ppD_'+id+' .on').forEach(function(b){dias.push(Number(b.getAttribute('data-dow')));});
  if(!dias.length){alert('Selecciona al menos un dia');return;}
  var hi=document.getElementById('ppRHi_'+id).value,hf=document.getElementById('ppRHf_'+id).value;
  var cur=new Date(fi+'T12:00:00'),end=new Date(ff+'T12:00:00'),count=0;
  while(cur<=end){
    var dow=cur.getDay();
    if(dias.indexOf(dow)>=0){
      var f=cur.toISOString().split('T')[0];
      var dk2=dowToDk(dow);
      S.actividades.push({id:Date.now()+count,titulo:p.titulo,cubo:p.cubo,subcat:p.subcat||'',prioridad:'media',hi:hi,hf:hf,fecha:f,dia:dk2,hecha:false,recurrente:false});
      count++;
    }
    cur.setDate(cur.getDate()+1);
  }
  if(!count){alert('No hay dias en ese rango');return;}
  S.pendientes=S.pendientes.filter(function(x){return x.id!==id;});
  save();rPend();rDia();rSem();
}

}

function confProgInv(iid){
  var item=S.inventario.find(function(x){return x.id===iid;});if(!item)return;
  var fi=document.getElementById('piF_'+iid).value;if(!fi){alert('Selecciona fecha inicio');return;}
  var dias=[];
  document.querySelectorAll('#piDias_'+iid+' .on').forEach(function(b){dias.push(Number(b.getAttribute('data-dow')));});
  if(!dias.length){alert('Selecciona dias');return;}
  var hi=document.getElementById('piHi_'+iid).value,hf=document.getElementById('piHf_'+iid).value;
  var durSes=hf&&hi?Math.max(15,(tM(hf)-tM(hi))):60;
  var totMin=Number(document.getElementById('piHrsR_'+iid).value)*60;
  var minRest=totMin,cur=new Date(fi+'T12:00:00'),count=0;
  // Remove old sessions for this course
  S.actividades=S.actividades.filter(function(a){return a.invId!==iid;});
  while(minRest>0&&count<500){
    var dow=cur.getDay();
    if(dias.indexOf(dow)>=0){
      var dur=Math.min(durSes,minRest);
      var fSes=cur.toISOString().split('T')[0];
      var dk2=dowToDk(dow);
      S.actividades.push({id:Date.now()+count,titulo:item.nombre+' — Sesion '+(Math.floor((totMin-minRest)/durSes)+1),cubo:'academico',prioridad:'media',hi:hi,hf:hf,fecha:fSes,dia:dk2,hecha:false,recurrente:false,invId:iid});
      minRest-=dur;
    }
    cur.setDate(cur.getDate()+1);
    count++;
  }
  S.inventario=S.inventario.map(function(i){return i.id===iid?Object.assign({},i,{estado:1}):i;});
  save();
  document.getElementById('progInv_'+iid).innerHTML='';
  document.getElementById('progInv_'+iid).style.display='none';
  rInv();rDia();rSem();
  alert('Sesiones programadas en tu calendario.');
}

  .then(function(r){return r.json();})
  .then(function(data){
    var ld=document.getElementById('vld');if(ld)ld.remove();
    var reply=data.content&&data.content.find(function(b){return b.type==='text';});
    var text=reply?reply.text:'Sin respuesta.';
    S.mensajes.push({rol:'asistente',texto:text});save();renderMsgs();
  })
  .catch(function(){
    var ld=document.getElementById('vld');if(ld)ld.remove();
    valOffline();save();renderMsgs();
  });
}

function showRespaldo(){
  var h='<div class="modal-box"><div class="sec" style="margin-bottom:11px">Respaldo de datos</div>'
    +'<p style="font-size:12px;color:#666;line-height:1.6;margin-bottom:12px">Tus datos se guardan en este dispositivo. Exporta semanalmente.</p>'
    +'<button onclick="exportar()" class="btn" style="margin-bottom:8px">Exportar (.json)</button>'
    +'<button onclick="importar()" class="btns" style="margin-bottom:8px">Importar respaldo</button>'
    +'<button onclick="document.getElementById(\'modalRen\').style.display=\'none\'" style="width:100%;padding:10px;background:#F5EEF1;border:none;border-radius:9px;font-size:12px;color:#888;cursor:pointer;font-family:inherit">Cerrar</button></div>';
  var modal=document.getElementById('modalRen');
  modal.innerHTML=h;
  modal.style.display='flex';
}
function exportar(){var b=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});var u=URL.createObjectURL(b);var a=document.createElement('a');a.href=u;a.download='cubos-'+toS()+'.json';a.click();URL.revokeObjectURL(u);}
function importar(){var i=document.createElement('input');i.type='file';i.accept='.json';i.onchange=function(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){try{var d=JSON.parse(ev.target.result);if(!d.actividades)throw new Error('Invalido');S=d;save();location.reload();}catch(err){alert('Archivo invalido.');}};r.readAsText(f);};i.click();}

// ============================================================
// HISTORIAL
// ============================================================
function rHistorial(){
  var cumplidas=S.actividades.filter(function(a){return a.hecha;});
  cumplidas.sort(function(a,b){
    var fa=a.fechaHecha||a.fecha||'';
    var fb=b.fechaHecha||b.fecha||'';
    return fb.localeCompare(fa);
  });
  var h='<div class="hint">Todas las actividades completadas, ordenadas de mas reciente a mas antigua.</div>';
  // Stats
  h+='<div class="g3" style="margin-bottom:10px">';
  h+='<div class="card" style="text-align:center;border-top:3px solid #22C55E;padding:11px"><div style="font-size:22px;font-weight:900;color:#22C55E">'+cumplidas.length+'</div><div style="font-size:9px;color:#999">Completadas</div></div>';
  var hrsTotal=cumplidas.reduce(function(s,a){return s+Math.max(0,tM(a.hf)-tM(a.hi))/60;},0);
  h+='<div class="card" style="text-align:center;border-top:3px solid #9B4468;padding:11px"><div style="font-size:22px;font-weight:900;color:#9B4468">'+hrsTotal.toFixed(0)+'h</div><div style="font-size:9px;color:#999">Ejecutadas</div></div>';
  var pct=S.actividades.length?Math.round(cumplidas.length/S.actividades.length*100):0;
  h+='<div class="card" style="text-align:center;border-top:3px solid #60A5FA;padding:11px"><div style="font-size:22px;font-weight:900;color:#60A5FA">'+pct+'%</div><div style="font-size:9px;color:#999">Del total</div></div>';
  h+='</div>';
  if(!cumplidas.length){
    h+='<div class="card"><div class="empty">Aun no hay actividades completadas.</div></div>';
    document.getElementById('v-historial').innerHTML=h;
    return;
  }
  // Group by date
  var byDate={};
  cumplidas.forEach(function(a){
    var f=a.fechaHecha||a.fecha||'Sin fecha';
    if(!byDate[f])byDate[f]=[];
    byDate[f].push(a);
  });
  Object.keys(byDate).sort(function(a,b){return b.localeCompare(a);}).forEach(function(fecha){
    h+='<div style="font-size:10px;font-weight:800;color:#9B4468;letter-spacing:1.5px;margin:12px 0 6px">'+( fecha==='Sin fecha'?'SIN FECHA':fds(fecha).toUpperCase())+'</div>';
    byDate[fecha].forEach(function(a){
      var cub=gc(a.cubo);
      h+='<div class="act" style="background:'+cub.bg+';border-left-color:'+cub.c+';opacity:0.85">';
      h+='<div style="display:flex;align-items:flex-start;gap:8px">';
      h+='<div style="width:20px;height:20px;border-radius:6px;background:#22C55E;display:flex;align-items:center;justify-content:center;font-size:11px;color:white;flex-shrink:0;margin-top:1px">✓</div>';
      h+='<div style="flex:1">';
      h+='<div style="font-size:12px;font-weight:700;color:'+cub.dk+';text-decoration:line-through">'+a.titulo+'</div>';
      if(a.hi)h+='<div style="font-size:10px;color:#888">'+a.hi+(a.hf?'–'+a.hf:'')+'</div>';
      h+=bdg(cub.bg,cub.dk,cub.l);
      if(a.subcat)h+=' '+bdg(cub.bg,cub.c,a.subcat);
      if(a.subsubcat)h+=' '+bdg(cub.bg,cub.c,a.subsubcat);
      h+='</div>';
      h+='<button onclick="dsmHist('+a.id+')" style="background:none;border:none;font-size:10px;color:#CCC;cursor:pointer;font-family:inherit;white-space:nowrap">Deshacer</button>';
      h+='</div></div>';
    });
  });
  h+='<div style="text-align:center;margin-top:14px"><button onclick="limpiarHistorial()" style="background:none;border:1.5px solid #EF4444;color:#EF4444;border-radius:8px;padding:8px 16px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit">Limpiar historial completadas</button></div>';
  document.getElementById('v-historial').innerHTML=h;
}
function dsmHist(id){
  S.actividades=S.actividades.map(function(a){return a.id===id?Object.assign({},a,{hecha:false,fechaHecha:null}):a;});
  save();rHistorial();rDia();rSem();
}
function limpiarHistorial(){
  S.actividades=S.actividades.filter(function(a){return !a.hecha;});
  save();rHistorial();
}
